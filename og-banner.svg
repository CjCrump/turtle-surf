<path d="M0,-9 Q22,-18 40,-4 Q43,0 40,4 Q22,18 0,9 Z" fill="#0c8f68" transform="translate(-46,18) rotate(110)"/>
<path d="M0,-15 Q43,-30 78,-6.6 Q83,0 78,6.6 Q43,30 0,15 Z" fill="#1fe3a6" transform="translate(24,-22) rotate(290)"/>
