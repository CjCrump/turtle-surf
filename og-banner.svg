<circle cx="430" cy="200" r="2.2" opacity="0.12"/>
<circle cx="560" cy="90" r="2.8" opacity="0.1"/>
<circle cx="610" cy="240" r="2.4" opacity="0.11"/>
<circle cx="520" cy="160" r="2" opacity="0.13"/>
