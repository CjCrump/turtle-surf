<svg width="680" height="300" viewBox="0 0 680 300" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Turtle Surf banner</title>
<desc>A sea turtle with a hexagonal-plated shell and long flippers glides toward a reef gap over deep ocean water, beside the Turtle Surf wordmark.</desc>
<defs>
<linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#083247"/>
<stop offset="0.55" stop-color="#04161f"/>
<stop offset="1" stop-color="#02090d"/>
</linearGradient>
<radialGradient id="shell" cx="0.38" cy="0.34" r="0.75">
<stop offset="0" stop-color="#e6fff6"/>
<stop offset="0.45" stop-color="#1fe3a6"/>
<stop offset="1" stop-color="#0c8f68"/>
</radialGradient>
<polygon id="hex" points="20,0 10,14.9 -10,14.9 -20,0 -10,-14.9 10,-14.9"/>
<polygon id="pent" points="0,-15.48 17.12,-4.78 10.58,12.52 -10.58,12.52 -17.12,-4.78"/>
</defs>

<rect x="0" y="0" width="680" height="300" fill="url(#water)"/>

<g opacity="0.85">
<polygon points="60,0 96,0 150,300 96,300" fill="#1fe3a6" opacity="0.04"/>
<polygon points="300,0 330,0 410,300 350,300" fill="#1fe3a6" opacity="0.035"/>
<polygon points="500,0 540,0 590,300 540,300" fill="#1fe3a6" opacity="0.03"/>
</g>

<g fill="#1fe3a6">
