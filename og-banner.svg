<text x="46" y="178" font-family="'Archivo', system-ui, sans-serif" font-size="58" font-weight="800" letter-spacing="1" fill="#e6fff6">Turtle<tspan fill="#1fe3a6"> Surf</tspan></text>
<text x="48" y="212" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="15" letter-spacing="1" fill="#7fa3a0">Glide the reef — one button</text>
