<rect x="608" y="108" width="54" height="12" rx="6" fill="#ff7a52"/>
<rect x="608" y="190" width="54" height="12" rx="6" fill="#ff7a52"/>
<line x1="612" y1="118" x2="658" y2="118" stroke="#1fe3a6" stroke-width="2" opacity="0.55"/>
<line x1="612" y1="190" x2="658" y2="190" stroke="#1fe3a6" stroke-width="2" opacity="0.55"/>
</g>

<g transform="translate(455,152) scale(1.15)">
